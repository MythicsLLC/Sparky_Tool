name: Deploy React to OCI Object Storage

on:
  push:
    branches:
      - main # Triggers when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Grab your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Use your React app's Node version

      # 3. Install dependencies and Build the React app (Pointed to frontend subfolder)
      - name: Install and Build
        working-directory: frontend
        run: |
          npm install
          npm run build

      # 4. Install and Configure OCI CLI manually
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI CLI Config and Key
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      # 5. Upload the compiled build folder to your OCI Bucket
      - name: Upload to OCI Bucket
        run: |
          # Replace <YOUR_NAMESPACE> and <YOUR_BUCKET_NAME> below!
          # Notice we point to frontend/build/ now!
          oci os object bulk-upload \
            --namespace <YOUR_NAMESPACE> \
            --bucket-name <YOUR_BUCKET_NAME> \
            --src-dir frontend/build/ \
            --overwrite \
            --content-type auto

      # 5. Upload the compiled build folder to your OCI Bucket
      - name: Upload to OCI Bucket
        run: |
          # Replace <YOUR_NAMESPACE> and <YOUR_BUCKET_NAME> below!
          oci os object bulk-upload \
            --namespace <YOUR_NAMESPACE> \
            --bucket-name <YOUR_BUCKET_NAME> \
            --src-dir build/ \
            --overwrite \
            --content-type auto