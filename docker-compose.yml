services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm ci && npm run dev -- --host"
    depends_on:
      - backend
